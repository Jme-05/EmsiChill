  categories: "&eCategorías: &fauth, teleport, skin, region, grave, social, staff y admin&e. Ejemplo: &f/emsichill help social&e."
  account: "&eCuenta: &f/register <password> <password>, /login <password>, /changepassword <current> <new> <new>, /unregister <password>&e."
  teleports: "&eTeletransportes: &f/home [name], /sethome [name], /delhome <name>, /tpa <player>, /tpaccept, /back [player], /rtp&e."
